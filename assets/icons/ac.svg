<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <title>AP Gateway Ruijie style Cisco colors</title>

  <!-- Sombra base -->
  <ellipse cx="32" cy="58" rx="24" ry="3" fill="#005aaa" opacity="0.25"/>

  <!-- Cuerpo principal del gateway (caja horizontal estilo rack) -->
  <rect x="4" y="20" width="56" height="30" rx="3" fill="#1ba0d7"/>
  <!-- Cara superior clara -->
  <rect x="4" y="20" width="56" height="5" rx="3" fill="#5bc8f5"/>
  <rect x="4" y="23" width="56" height="2" fill="#5bc8f5"/>
  <!-- Lado derecho sombra -->
  <rect x="57" y="20" width="3" height="30" rx="0" fill="#005aaa"/>
  <rect x="57" y="47" width="3" height="3" rx="2" fill="#005aaa"/>
  <!-- Cara inferior sombra -->
  <rect x="4" y="47" width="56" height="3" rx="2" fill="#0070d2"/>

  <!-- Panel frontal interno -->
  <rect x="7" y="24" width="50" height="20" rx="2" fill="#0070d2"/>

  <!-- ── Sección izquierda: logo / nombre ── -->
  <rect x="9" y="26" width="14" height="16" rx="1" fill="#005aaa"/>
  <!-- Símbolo AP/wireless en el logo -->
  <path d="M 12 36 Q 16 30 20 36" fill="none" stroke="#5bc8f5" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M 13.5 38 Q 16 34 18.5 38" fill="none" stroke="#5bc8f5" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="16" cy="39.5" r="1.2" fill="#ffffff"/>

  <!-- ── Puertos WAN (2) ── -->
  <rect x="25" y="27" width="6" height="5" rx="1" fill="#005aaa"/>
  <rect x="26" y="28" width="4" height="3" rx="0.5" fill="#1ba0d7"/>
  <rect x="33" y="27" width="6" height="5" rx="1" fill="#005aaa"/>
  <rect x="34" y="28" width="4" height="3" rx="0.5" fill="#1ba0d7"/>

  <!-- Etiqueta WAN -->
  <text x="28" y="35.5" text-anchor="middle" font-family="Arial" font-size="4" font-weight="bold" fill="#5bc8f5">WAN</text>

  <!-- ── Puertos LAN (4) ── -->
  <rect x="25" y="37" width="5" height="4" rx="1" fill="#005aaa"/>
  <rect x="25.5" y="37.5" width="4" height="3" rx="0.5" fill="#1ba0d7"/>
  <rect x="31" y="37" width="5" height="4" rx="1" fill="#005aaa"/>
  <rect x="31.5" y="37.5" width="4" height="3" rx="0.5" fill="#1ba0d7"/>
  <rect x="37" y="37" width="5" height="4" rx="1" fill="#005aaa"/>
  <rect x="37.5" y="37.5" width="4" height="3" rx="0.5" fill="#1ba0d7"/>
  <rect x="43" y="37" width="5" height="4" rx="1" fill="#005aaa"/>
  <rect x="43.5" y="37.5" width="4" height="3" rx="0.5" fill="#1ba0d7"/>

  <!-- Etiqueta LAN -->
  <text x="37" y="35.5" text-anchor="middle" font-family="Arial" font-size="4" font-weight="bold" fill="#5bc8f5">LAN</text>

  <!-- ── LEDs de estado ── -->
  <circle cx="51" cy="28" r="1.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="51" cy="33" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="51" cy="38" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="51" cy="43" r="1.5" fill="#ffffff" opacity="0.4"/>

  <!-- Patas del dispositivo -->
  <rect x="8"  y="50" width="6" height="3" rx="1" fill="#005aaa"/>
  <rect x="50" y="50" width="6" height="3" rx="1" fill="#005aaa"/>

  <!-- Ondas WiFi arriba (representa gestión de APs) -->
  <path d="M 20 14 Q 32 6 44 14" fill="none" stroke="#1ba0d7" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M 24 17 Q 32 11 40 17" fill="none" stroke="#1ba0d7" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <circle cx="32" cy="19" r="1.8" fill="#0070d2"/>
  <circle cx="32" cy="19" r="1" fill="#ffffff"/>

</svg>
