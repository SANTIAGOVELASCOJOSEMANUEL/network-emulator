<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <title>Load Balancer Router Ruijie style Cisco colors</title>

  <!-- Sombra base -->
  <ellipse cx="32" cy="60" rx="26" ry="2" fill="#005aaa" opacity="0.25"/>

  <!-- Cuerpo rack 1U -->
  <rect x="3" y="20" width="58" height="26" rx="3" fill="#1ba0d7"/>
  <rect x="3" y="20" width="58" height="5" rx="3" fill="#5bc8f5"/>
  <rect x="3" y="23" width="58" height="2" fill="#5bc8f5"/>
  <rect x="58" y="20" width="3" height="26" rx="0" fill="#005aaa"/>
  <rect x="58" y="43" width="3" height="3" rx="2" fill="#005aaa"/>
  <rect x="3"  y="43" width="58" height="3" rx="2" fill="#0070d2"/>

  <!-- Panel frontal -->
  <rect x="6" y="25" width="52" height="17" rx="2" fill="#0070d2"/>

  <!-- Icono balanceador izquierda (flechas balanceadas) -->
  <rect x="8" y="27" width="12" height="13" rx="1" fill="#005aaa"/>
  <!-- Flecha arriba izquierda -->
  <line x1="11" y1="36" x2="11" y2="29" stroke="#5bc8f5" stroke-width="1.2" stroke-linecap="round"/>
  <polygon points="11,28 9.5,31 12.5,31" fill="#5bc8f5"/>
  <!-- Flecha abajo derecha -->
  <line x1="17" y1="29" x2="17" y2="36" stroke="#5bc8f5" stroke-width="1.2" stroke-linecap="round"/>
  <polygon points="17,37 15.5,34 18.5,34" fill="#5bc8f5"/>
  <!-- Línea central balanceador -->
  <line x1="9" y1="33" x2="19" y2="33" stroke="#1ba0d7" stroke-width="1" opacity="0.6"/>

  <!-- WAN ports x2 -->
  <text x="27" y="29" text-anchor="middle" font-family="Arial" font-size="3.5" font-weight="bold" fill="#5bc8f5">WAN</text>
  <rect x="22" y="30" width="5" height="4" rx="1" fill="#005aaa"/>
  <rect x="22.5" y="30.5" width="4" height="3" rx="0.5" fill="#1ba0d7"/>
  <rect x="28" y="30" width="5" height="4" rx="1" fill="#005aaa"/>
  <rect x="28.5" y="30.5" width="4" height="3" rx="0.5" fill="#1ba0d7"/>

  <!-- LAN ports x4 -->
  <text x="42" y="29" text-anchor="middle" font-family="Arial" font-size="3.5" font-weight="bold" fill="#5bc8f5">LAN</text>
  <rect x="35" y="30" width="4" height="4" rx="1" fill="#005aaa"/>
  <rect x="35.5" y="30.5" width="3" height="3" rx="0.5" fill="#1ba0d7"/>
  <rect x="40" y="30" width="4" height="4" rx="1" fill="#005aaa"/>
  <rect x="40.5" y="30.5" width="3" height="3" rx="0.5" fill="#1ba0d7"/>
  <rect x="45" y="30" width="4" height="4" rx="1" fill="#005aaa"/>
  <rect x="45.5" y="30.5" width="3" height="3" rx="0.5" fill="#1ba0d7"/>
  <rect x="50" y="30" width="4" height="4" rx="1" fill="#005aaa"/>
  <rect x="50.5" y="30.5" width="3" height="3" rx="0.5" fill="#1ba0d7"/>

  <!-- Métricas de balance (barras) -->
  <rect x="22" y="36" width="4" height="5" rx="0.5" fill="#005aaa"/>
  <rect x="22" y="38" width="4" height="3" rx="0.5" fill="#1ba0d7"/>

  <rect x="27" y="36" width="4" height="5" rx="0.5" fill="#005aaa"/>
  <rect x="27" y="37" width="4" height="4" rx="0.5" fill="#1ba0d7"/>

  <rect x="32" y="36" width="4" height="5" rx="0.5" fill="#005aaa"/>
  <rect x="32" y="39" width="4" height="2" rx="0.5" fill="#1ba0d7"/>

  <rect x="37" y="36" width="4" height="5" rx="0.5" fill="#005aaa"/>
  <rect x="37" y="37.5" width="4" height="3.5" rx="0.5" fill="#1ba0d7"/>

  <!-- LEDs -->
  <circle cx="56" cy="28" r="1.3" fill="#1ba0d7" opacity="0.9"/>
  <circle cx="56" cy="32" r="1.3" fill="#1ba0d7" opacity="0.7"/>
  <circle cx="56" cy="36" r="1.3" fill="#1ba0d7" opacity="0.5"/>
  <circle cx="56" cy="40" r="1.3" fill="#1ba0d7" opacity="0.4"/>

  <!-- Patas -->
  <rect x="6"  y="46" width="8" height="3" rx="1" fill="#005aaa"/>
  <rect x="50" y="46" width="8" height="3" rx="1" fill="#005aaa"/>

  <!-- Etiqueta -->
  <text x="32" y="57" text-anchor="middle" font-family="Arial" font-size="5" font-weight="bold" fill="#0070d2" letter-spacing="0.5">BALANCER</text>

</svg>
