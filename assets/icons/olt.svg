  <rect x="31.5" y="40.5" width="4" height="3" rx="0.5" fill="#1ba0d7"/>
  <rect x="37" y="40" width="5" height="4" rx="1" fill="#005aaa"/>
  <rect x="37.5" y="40.5" width="4" height="3" rx="0.5" fill="#1ba0d7"/>
  <rect x="43" y="40" width="5" height="4" rx="1" fill="#005aaa"/>
  <rect x="43.5" y="40.5" width="4" height="3" rx="0.5" fill="#1ba0d7"/>
