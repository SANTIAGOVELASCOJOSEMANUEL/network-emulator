  <circle cx="55" cy="37" r="1.3" fill="#1ba0d7" opacity="0.6"/>
  <circle cx="55" cy="41" r="1.3" fill="#1ba0d7" opacity="0.6"/>
  <circle cx="55" cy="45" r="1.3" fill="#1ba0d7" opacity="0.4"/>

  <!-- Símbolo fibra óptica izquierda -->
  <path d="M 8 22 Q 13 19 18 22 Q 13 25 8 22Z" fill="#5bc8f5" opacity="0.5"/>
  <circle cx="13" cy="22" r="1.5" fill="#ffffff"/>
  <circle cx="13" cy="22" r="0.8" fill="#1ba0d7"/>

  <!-- Patas rack -->
  <rect x="5"  y="52" width="8" height="3" rx="1" fill="#005aaa"/>
