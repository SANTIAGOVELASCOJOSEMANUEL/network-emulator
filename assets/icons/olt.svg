  <rect x="7.5" y="40.5" width="4" height="3" rx="0.5" fill="#1ba0d7"/>
  <rect x="13" y="40" width="5" height="4" rx="1" fill="#005aaa"/>
  <rect x="13.5" y="40.5" width="4" height="3" rx="0.5" fill="#1ba0d7"/>
