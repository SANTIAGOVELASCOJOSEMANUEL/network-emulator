<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <title>OLT icon Cisco Packet Tracer style</title>

  <!-- Sombra base -->
  <ellipse cx="32" cy="60" rx="26" ry="2.5" fill="#005aaa" opacity="0.25"/>

  <!-- Cuerpo principal rack 2U -->
  <rect x="3" y="14" width="58" height="38" rx="3" fill="#1ba0d7"/>
