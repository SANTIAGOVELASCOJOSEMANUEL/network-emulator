  <rect x="58" y="14" width="3" height="38" rx="0" fill="#005aaa"/>
  <rect x="58" y="49" width="3" height="3" rx="2" fill="#005aaa"/>
  <!-- Sombra inferior -->
  <rect x="3" y="49" width="58" height="3" rx="2" fill="#0070d2"/>

  <!-- Panel frontal -->
  <rect x="6" y="19" width="52" height="28" rx="2" fill="#0070d2"/>

  <!-- Etiqueta OLT -->
  <text x="13" y="26" text-anchor="middle" font-family="Arial" font-size="5" font-weight="bold" fill="#5bc8f5" letter-spacing="0.5">OLT</text>

  <!-- Uplink SFP+ puertos (fibra, fila superior) -->
  <text x="36" y="24" text-anchor="middle" font-family="Arial" font-size="3.5" font-weight="bold" fill="#5bc8f5">UPLINK</text>
  <rect x="24" y="25" width="6" height="5" rx="1" fill="#005aaa"/>
  <rect x="24.5" y="25.5" width="5" height="4" rx="0.5" fill="#1ba0d7"/>
  <rect x="31" y="25" width="6" height="5" rx="1" fill="#005aaa"/>
  <rect x="31.5" y="25.5" width="5" height="4" rx="0.5" fill="#1ba0d7"/>
  <rect x="38" y="25" width="6" height="5" rx="1" fill="#005aaa"/>
  <rect x="38.5" y="25.5" width="5" height="4" rx="0.5" fill="#1ba0d7"/>
  <rect x="45" y="25" width="6" height="5" rx="1" fill="#005aaa"/>
  <rect x="45.5" y="25.5" width="5" height="4" rx="0.5" fill="#1ba0d7"/>

  <!-- Puertos PON (fila media - 8 puertos) -->
  <text x="36" y="34" text-anchor="middle" font-family="Arial" font-size="3.5" font-weight="bold" fill="#5bc8f5">PON PORTS</text>
  <!-- Fila 1 de PON -->
  <rect x="7"  y="35" width="5" height="4" rx="1" fill="#005aaa"/>
