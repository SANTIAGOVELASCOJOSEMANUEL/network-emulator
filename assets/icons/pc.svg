<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <title>PC Desktop icon Cisco Packet Tracer style</title>

  <!-- Monitor -->
  <rect x="10" y="6" width="44" height="32" rx="3" fill="#1ba0d7"/>
  <rect x="10" y="6"  width="44" height="5" rx="3" fill="#5bc8f5"/>
  <rect x="10" y="9"  width="44" height="2"         fill="#5bc8f5"/>
  <rect x="51" y="6"  width="3"  height="32" rx="0" fill="#005aaa"/>
  <rect x="10" y="35" width="44" height="3"  rx="2" fill="#0070d2"/>

  <!-- Pantalla -->
  <rect x="13" y="9" width="38" height="25" rx="1" fill="#003366"/>
  <rect x="13" y="9" width="38" height="5"  rx="1" fill="#001f3f"/>
  <!-- Contenido -->
  <line x1="17" y1="19" x2="43" y2="19" stroke="#1ba0d7" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="17" y1="23" x2="39" y2="23" stroke="#1ba0d7" stroke-width="1"   stroke-linecap="round" opacity="0.5"/>
  <line x1="17" y1="27" x2="41" y2="27" stroke="#1ba0d7" stroke-width="1"   stroke-linecap="round" opacity="0.5"/>
  <!-- Íconos OS en barra superior -->
  <circle cx="17" cy="11.5" r="1.5" fill="#e63946" opacity="0.8"/>
  <circle cx="21" cy="11.5" r="1.5" fill="#ffd166" opacity="0.8"/>
  <circle cx="25" cy="11.5" r="1.5" fill="#2dc653" opacity="0.8"/>

  <!-- Cuello -->
  <rect x="28" y="38" width="8" height="6" rx="1" fill="#005aaa"/>

  <!-- Base monitor -->
  <rect x="20" y="43" width="24" height="4" rx="2" fill="#0070d2"/>
  <rect x="20" y="43" width="24" height="2" rx="2" fill="#1ba0d7"/>

  <!-- Torre PC -->
  <rect x="6" y="36" width="14" height="22" rx="2" fill="#1ba0d7"/>
  <rect x="6" y="36" width="14" height="4"  rx="2" fill="#5bc8f5"/>
  <rect x="17" y="36" width="3"  height="22" rx="0" fill="#005aaa"/>
  <rect x="6"  y="55" width="14" height="3"  rx="2" fill="#0070d2"/>

  <!-- Ranura CD/DVD -->
  <rect x="8" y="41" width="10" height="2" rx="1" fill="#005aaa"/>
  <rect x="8.5" y="41.5" width="8" height="1" rx="0.5" fill="#1ba0d7"/>

  <!-- Botón power torre -->
  <circle cx="11" cy="46" r="2" fill="#0070d2"/>
  <circle cx="11" cy="46" r="1.2" fill="#1ba0d7"/>

  <!-- USB puertos torre -->
  <rect x="8" y="49" width="3" height="2" rx="0.5" fill="#005aaa"/>
  <rect x="8.5" y="49.5" width="2" height="1" rx="0.3" fill="#1ba0d7"/>
  <rect x="8" y="52" width="3" height="2" rx="0.5" fill="#005aaa"/>
  <rect x="8.5" y="52.5" width="2" height="1" rx="0.3" fill="#1ba0d7"/>

  <!-- LED torre -->
  <circle cx="15" cy="46" r="1.2" fill="#1ba0d7" opacity="0.8"/>

  <!-- Teclado -->
  <rect x="22" y="51" width="28" height="8" rx="2" fill="#0070d2"/>
  <rect x="22" y="51" width="28" height="2" rx="2" fill="#1ba0d7"/>
  <rect x="24" y="53" width="6"  height="2" rx="0.5" fill="#005aaa"/>
  <rect x="31" y="53" width="10" height="2" rx="0.5" fill="#005aaa"/>
  <rect x="42" y="53" width="6"  height="2" rx="0.5" fill="#005aaa"/>
  <rect x="24" y="56" width="22" height="2" rx="0.5" fill="#005aaa"/>

</svg>
