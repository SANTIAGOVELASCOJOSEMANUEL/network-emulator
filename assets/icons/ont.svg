<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <title>ONT icon Cisco Packet Tracer style</title>

  <!-- Sombra base -->
  <ellipse cx="32" cy="60" rx="20" ry="2" fill="#005aaa" opacity="0.25"/>

  <!-- Cuerpo vertical tipo módem -->
  <rect x="16" y="10" width="32" height="46" rx="4" fill="#1ba0d7"/>
  <!-- Cara superior clara -->
  <rect x="16" y="10" width="32" height="6" rx="4" fill="#5bc8f5"/>
  <rect x="16" y="13" width="32" height="3" fill="#5bc8f5"/>
  <!-- Sombra lateral derecha -->
  <rect x="44" y="10" width="4" height="46" rx="0" fill="#005aaa"/>
  <rect x="44" y="52" width="4" height="4" rx="3" fill="#005aaa"/>
  <!-- Sombra inferior -->
  <rect x="16" y="52" width="32" height="4" rx="3" fill="#0070d2"/>

  <!-- Panel frontal -->
  <rect x="19" y="15" width="26" height="37" rx="2" fill="#0070d2"/>

  <!-- Etiqueta ONT -->
  <text x="32" y="22" text-anchor="middle" font-family="Arial" font-size="5" font-weight="bold" fill="#5bc8f5" letter-spacing="1">ONT</text>

  <!-- Indicador fibra óptica (símbolo) -->
  <path d="M 27 27 Q 32 24 37 27 Q 32 30 27 27Z" fill="#5bc8f5" opacity="0.6"/>
  <circle cx="32" cy="27" r="2" fill="#ffffff"/>
  <circle cx="32" cy="27" r="1" fill="#1ba0d7"/>

  <!-- LEDs de estado -->
  <rect x="22" y="32" width="20" height="14" rx="1" fill="#005aaa"/>

  <circle cx="26" cy="36" r="1.8" fill="#1ba0d7" opacity="0.4"/>
  <text x="30" y="37.5" font-family="Arial" font-size="3.5" fill="#5bc8f5">PWR</text>

  <circle cx="26" cy="41" r="1.8" fill="#1ba0d7" opacity="0.4"/>
  <text x="30" y="42.5" font-family="Arial" font-size="3.5" fill="#5bc8f5">PON</text>

  <circle cx="26" cy="46" r="1.8" fill="#1ba0d7" opacity="0.4"/>  
  <text x="30" y="47" font-family="Arial" font-size="3.5" fill="#5bc8f5">LAN</text>

  <!-- Puerto fibra óptica SC/UPC -->
  <rect x="22" y="48" width="6" height="4" rx="1" fill="#005aaa"/>
  <rect x="22.5" y="48.5" width="5" height="3" rx="0.5" fill="#1ba0d7"/>

  <!-- Puerto LAN RJ45 -->
  <rect x="30" y="48" width="6" height="4" rx="1" fill="#005aaa"/>
  <rect x="30.5" y="48.5" width="5" height="3" rx="0.5" fill="#1ba0d7"/>

  <!-- Puerto energía -->
  <rect x="38" y="48" width="4" height="4" rx="1" fill="#005aaa"/>
  <circle cx="40" cy="50" r="1.2" fill="#1ba0d7"/>

  <!-- Patas -->
  <rect x="19" y="56" width="6" height="2" rx="1" fill="#005aaa"/>
  <rect x="39" y="56" width="6" height="2" rx="1" fill="#005aaa"/>

</svg>
