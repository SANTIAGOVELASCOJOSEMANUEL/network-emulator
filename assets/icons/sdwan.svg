<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <title>SD-WAN icon Cisco Packet Tracer style</title>

  <!-- Nube principal (SD-WAN = red en la nube) -->
  <!-- Cuerpo nube -->
  <circle cx="22" cy="30" r="10" fill="#1ba0d7"/>
  <circle cx="32" cy="24" r="12" fill="#1ba0d7"/>
  <circle cx="43" cy="29" r="9" fill="#1ba0d7"/>
  <rect x="13" y="29" width="39" height="14" rx="0" fill="#1ba0d7"/>

  <!-- Cara superior nube más clara -->
  <circle cx="22" cy="30" r="10" fill="#5bc8f5" clip-path="url(#top)"/>
  <circle cx="32" cy="24" r="12" fill="#5bc8f5" clip-path="url(#top)"/>
  <circle cx="43" cy="29" r="9" fill="#5bc8f5" clip-path="url(#top)"/>

  <defs>
    <clipPath id="top">
      <rect x="0" y="0" width="64" height="32"/>
    </clipPath>
    <clipPath id="bottom">
      <rect x="0" y="32" width="64" height="32"/>
    </clipPath>
  </defs>

  <!-- Parte inferior nube sombra -->
  <circle cx="22" cy="30" r="10" fill="#0070d2" clip-path="url(#bottom)"/>
  <circle cx="43" cy="29" r="9" fill="#0070d2" clip-path="url(#bottom)"/>
  <rect x="13" y="32" width="39" height="11" rx="0" fill="#0070d2"/>
  <!-- base redondeada inferior -->
  <rect x="13" y="36" width="39" height="7" rx="4" fill="#0070d2"/>

  <!-- Líneas de red dentro de la nube (SD = Software Defined) -->
  <!-- Nodo central -->
  <circle cx="32" cy="31" r="4" fill="#ffffff"/>
  <circle cx="32" cy="31" r="2.5" fill="#0070d2"/>

  <!-- Nodo izquierda -->
  <circle cx="20" cy="35" r="2.5" fill="#ffffff"/>
  <circle cx="20" cy="35" r="1.5" fill="#0070d2"/>

  <!-- Nodo derecha -->
  <circle cx="44" cy="35" r="2.5" fill="#ffffff"/>
  <circle cx="44" cy="35" r="1.5" fill="#0070d2"/>

  <!-- Nodo arriba -->
  <circle cx="32" cy="21" r="2.5" fill="#ffffff"/>
  <circle cx="32" cy="21" r="1.5" fill="#0070d2"/>

  <!-- Líneas de conexión -->
  <line x1="32" y1="27" x2="32" y2="23.5" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="28.5" y1="33" x2="22" y2="33.5" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="35.5" y1="33" x2="41.5" y2="33.5" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="29.5" y1="33.5" x2="21.5" y2="33" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Base/pedestal -->
  <rect x="28" y="43" width="8" height="4" rx="0" fill="#005aaa"/>
  <rect x="22" y="47" width="20" height="4" rx="2" fill="#0070d2"/>
  <rect x="22" y="47" width="20" height="2" rx="2" fill="#1ba0d7"/>

  <!-- Texto SD-WAN pequeño -->
  <text x="32" y="57" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#0070d2" letter-spacing="0.5">SD-WAN</text>
</svg>
