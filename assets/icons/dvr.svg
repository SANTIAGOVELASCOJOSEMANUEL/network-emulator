<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <title>DVR icon Cisco Packet Tracer style</title>

  <!-- Sombra base -->
  <ellipse cx="32" cy="59" rx="24" ry="2.5" fill="#005aaa" opacity="0.25"/>

  <!-- Cuerpo principal -->
  <rect x="4" y="16" width="56" height="36" rx="3" fill="#1ba0d7"/>
  <!-- Cara superior clara -->
  <rect x="4" y="16" width="56" height="5" rx="3" fill="#5bc8f5"/>
  <rect x="4" y="19" width="56" height="2" fill="#5bc8f5"/>
  <!-- Sombra lateral derecha -->
  <rect x="57" y="16" width="3" height="36" rx="0" fill="#005aaa"/>
  <rect x="57" y="49" width="3" height="3" rx="2" fill="#005aaa"/>
  <!-- Sombra inferior -->
  <rect x="4" y="49" width="56" height="3" rx="2" fill="#0070d2"/>

  <!-- Panel frontal -->
  <rect x="7" y="21" width="50" height="26" rx="2" fill="#0070d2"/>

  <!-- ── Pantalla LCD ── -->
  <rect x="9" y="23" width="22" height="14" rx="2" fill="#001f3f"/>
  <rect x="9" y="23" width="22" height="3" rx="2" fill="#003366" opacity="0.8"/>
  <!-- Texto en pantalla -->
  <text x="20" y="31" text-anchor="middle" font-family="monospace" font-size="5" font-weight="bold" fill="#5bc8f5">REC</text>
  <circle cx="27" cy="29" r="2" fill="#e63946" opacity="0.9"/>
  <text x="20" y="35" text-anchor="middle" font-family="monospace" font-size="4" fill="#1ba0d7">00:00:00</text>

  <!-- ── Slot disco duro ── -->
  <rect x="9" y="39" width="22" height="6" rx="1" fill="#005aaa"/>
  <rect x="10" y="40" width="18" height="4" rx="1" fill="#003366"/>
  <!-- Líneas del HDD -->
  <line x1="11" y1="42" x2="26" y2="42" stroke="#1ba0d7" stroke-width="0.8" opacity="0.7"/>
  <circle cx="27" cy="42" r="1.2" fill="#1ba0d7" opacity="0.6"/>
  <text x="15" y="48" text-anchor="middle" font-family="Arial" font-size="3.5" fill="#5bc8f5">HDD</text>

  <!-- ── Botones de control ── -->
  <!-- Botón REW -->
  <rect x="33" y="23" width="7" height="6" rx="1.5" fill="#005aaa"/>
  <polygon points="38,24.5 38,27.5 35.5,26" fill="#5bc8f5"/>
  <polygon points="36.5,24.5 36.5,27.5 34,26" fill="#5bc8f5"/>

  <!-- Botón PLAY -->
  <rect x="41" y="23" width="7" height="6" rx="1.5" fill="#1a4d2e"/>
  <polygon points="43,24.5 43,27.5 46.5,26" fill="#2dc653"/>

  <!-- Botón STOP -->
  <rect x="49" y="23" width="7" height="6" rx="1.5" fill="#9b0e1c"/>
  <rect x="51" y="24.5" width="3" height="3" rx="0.5" fill="#e63946"/>

  <!-- Botón FF -->
  <rect x="33" y="31" width="7" height="6" rx="1.5" fill="#005aaa"/>
  <polygon points="35,32.5 35,35.5 37.5,34" fill="#5bc8f5"/>
  <polygon points="37,32.5 37,35.5 39.5,34" fill="#5bc8f5"/>

  <!-- Botón REC -->
  <rect x="41" y="31" width="7" height="6" rx="1.5" fill="#9b0e1c"/>
  <circle cx="44.5" cy="34" r="2" fill="#e63946"/>

  <!-- Botón PAUSE -->
  <rect x="49" y="31" width="7" height="6" rx="1.5" fill="#005aaa"/>
  <rect x="51" y="32.5" width="1.8" height="3" rx="0.5" fill="#5bc8f5"/>
  <rect x="53.7" y="32.5" width="1.8" height="3" rx="0.5" fill="#5bc8f5"/>

  <!-- ── Puertos traseros ── -->
  <!-- Puerto USB -->
  <rect x="33" y="39" width="5" height="6" rx="1" fill="#005aaa"/>
  <rect x="33.5" y="39.5" width="4" height="5" rx="0.5" fill="#1ba0d7"/>
  <text x="35.5" y="48.5" text-anchor="middle" font-family="Arial" font-size="3" fill="#5bc8f5">USB</text>

  <!-- Puerto HDMI -->
  <rect x="39" y="39" width="6" height="6" rx="1" fill="#7c5e00"/>
  <rect x="39.5" y="39.5" width="5" height="5" rx="0.5" fill="#ffd166"/>
  <text x="42" y="48.5" text-anchor="middle" font-family="Arial" font-size="3" fill="#ffd166">HDMI</text>

  <!-- Puerto LAN -->
  <rect x="46" y="39" width="5" height="6" rx="1" fill="#1a4d2e"/>
  <rect x="46.5" y="39.5" width="4" height="5" rx="0.5" fill="#2dc653"/>
  <text x="48.5" y="48.5" text-anchor="middle" font-family="Arial" font-size="3" fill="#2dc653">LAN</text>

  <!-- ── LEDs ── -->
  <circle cx="54" cy="42" r="1.3" fill="#2dc653"/>
  <circle cx="54" cy="46" r="1.3" fill="#e63946"/>

  <!-- Patas -->
  <rect x="8"  y="52" width="6" height="3" rx="1" fill="#005aaa"/>
  <rect x="50" y="52" width="6" height="3" rx="1" fill="#005aaa"/>

</svg>
