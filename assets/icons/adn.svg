<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <title>ADN - Armario de Distribución de Nodo 64x64</title>

  <!-- Sombra base -->
  <ellipse cx="32" cy="62" rx="20" ry="1.6" fill="#005aaa" opacity="0.2"/>

  <!-- ===== CUERPO ARMARIO RACK ===== -->
  <!-- Estructura principal -->
  <rect x="12" y="4" width="40" height="54" rx="3" fill="#0f3d6e"/>
  <!-- Highlight lateral izquierdo (volumen 3D) -->
  <rect x="12" y="4" width="4" height="54" rx="2" fill="#1a5fa0"/>
  <!-- Cara superior -->
  <rect x="12" y="4" width="40" height="4" rx="3" fill="#1a5fa0"/>
  <!-- Cara inferior -->
  <rect x="12" y="54" width="40" height="4" rx="2" fill="#082240"/>
  <!-- Cara lateral derecha (sombra) -->
  <rect x="49" y="4" width="3" height="54" rx="0" fill="#082240"/>

  <!-- Marco/puerta frontal del armario -->
  <rect x="16" y="7" width="32" height="48" rx="2" fill="#082240"/>

  <!-- ===== UNIDADES RACK (1U cada una) ===== -->

  <!-- U1: Patch panel superior -->
  <rect x="17" y="8" width="30" height="6" rx="1" fill="#0a2d52"/>
  <rect x="17.5" y="8.5" width="29" height="5" rx="0.8" fill="#0070d2"/>
  <!-- puertos patch -->
  <rect x="18.5" y="9.5" width="2.2" height="3" rx="0.4" fill="#005aaa"/>
  <rect x="21.2" y="9.5" width="2.2" height="3" rx="0.4" fill="#005aaa"/>
  <rect x="23.9" y="9.5" width="2.2" height="3" rx="0.4" fill="#005aaa"/>
  <rect x="26.6" y="9.5" width="2.2" height="3" rx="0.4" fill="#005aaa"/>
  <rect x="29.3" y="9.5" width="2.2" height="3" rx="0.4" fill="#005aaa"/>
  <rect x="32"   y="9.5" width="2.2" height="3" rx="0.4" fill="#005aaa"/>
  <rect x="34.7" y="9.5" width="2.2" height="3" rx="0.4" fill="#005aaa"/>
  <rect x="37.4" y="9.5" width="2.2" height="3" rx="0.4" fill="#005aaa"/>
  <rect x="40.1" y="9.5" width="2.2" height="3" rx="0.4" fill="#005aaa"/>
  <text x="44.5" y="12.5" font-family="Arial" font-size="3" fill="#5bc8f5" text-anchor="middle">PP</text>

  <!-- U2: Switch principal -->
  <rect x="17" y="15" width="30" height="7" rx="1" fill="#0a2d52"/>
  <rect x="17.5" y="15.5" width="29" height="6" rx="0.8" fill="#1ba0d7"/>
  <rect x="17.5" y="15.5" width="29" height="2" rx="0.8" fill="#5bc8f5"/>
  <!-- puertos switch coloreados -->
  <rect x="18.5" y="18.5" width="2" height="2.5" rx="0.3" fill="#22c55e"/>
  <rect x="21"   y="18.5" width="2" height="2.5" rx="0.3" fill="#22c55e"/>
  <rect x="23.5" y="18.5" width="2" height="2.5" rx="0.3" fill="#22c55e"/>
  <rect x="26"   y="18.5" width="2" height="2.5" rx="0.3" fill="#f97316"/>
  <rect x="28.5" y="18.5" width="2" height="2.5" rx="0.3" fill="#22c55e"/>
  <rect x="31"   y="18.5" width="2" height="2.5" rx="0.3" fill="#3b82f6"/>
  <rect x="33.5" y="18.5" width="2" height="2.5" rx="0.3" fill="#22c55e"/>
  <rect x="36"   y="18.5" width="2" height="2.5" rx="0.3" fill="#1e3a5f"/>
  <text x="43"   y="20" font-family="Arial" font-size="2.8" fill="#082240" font-weight="700">SW</text>
  <!-- LED switch -->
  <circle cx="44.5" cy="20.8" r="1" fill="#22c55e"/>

  <!-- U3: Router/Firewall -->
  <rect x="17" y="23" width="30" height="6" rx="1" fill="#0a2d52"/>
  <rect x="17.5" y="23.5" width="29" height="5" rx="0.8" fill="#0070d2"/>
  <!-- Icono router (flechas) -->
  <line x1="20" y1="27.5" x2="20" y2="25" stroke="#5bc8f5" stroke-width="0.9" stroke-linecap="round"/>
  <polygon points="20,24.3 19.1,25.8 20.9,25.8" fill="#5bc8f5"/>
  <line x1="23" y1="25" x2="23" y2="27.5" stroke="#5bc8f5" stroke-width="0.9" stroke-linecap="round"/>
  <polygon points="23,28.2 22.1,26.7 23.9,26.7" fill="#5bc8f5"/>
  <text x="36" y="27.5" font-family="Arial" font-size="2.8" fill="#5bc8f5" font-weight="700" text-anchor="middle">ROUTER</text>
  <circle cx="44.5" cy="25.5" r="1" fill="#22c55e"/>
  <circle cx="44.5" cy="27.8" r="1" fill="#f59e0b"/>

  <!-- U4: 1U vacía organizadora cables -->
  <rect x="17" y="30" width="30" height="4" rx="1" fill="#0a2d52"/>
  <rect x="17.5" y="30.5" width="29" height="3" rx="0.5" fill="#082240"/>
  <line x1="19" y1="32" x2="45" y2="32" stroke="#1a5fa0" stroke-width="0.5" stroke-dasharray="2,1.5"/>
  <text x="32" y="33" font-family="Arial" font-size="2.5" fill="#1a5fa0" text-anchor="middle">─── ─── ───</text>

  <!-- U5: ODF / Fibra óptica -->
  <rect x="17" y="35" width="30" height="6" rx="1" fill="#0a2d52"/>
  <rect x="17.5" y="35.5" width="29" height="5" rx="0.8" fill="#0070d2"/>
  <!-- puertos SFP/fibra (cian) -->
  <rect x="18.5" y="36.8" width="3" height="3" rx="0.5" fill="#06b6d4"/>
  <rect x="22.2" y="36.8" width="3" height="3" rx="0.5" fill="#06b6d4"/>
  <rect x="25.9" y="36.8" width="3" height="3" rx="0.5" fill="#06b6d4"/>
  <rect x="29.6" y="36.8" width="3" height="3" rx="0.5" fill="#1e3a5f"/>
  <rect x="33.3" y="36.8" width="3" height="3" rx="0.5" fill="#1e3a5f"/>
  <text x="43" y="39.5" font-family="Arial" font-size="2.8" fill="#06b6d4" font-weight="700" text-anchor="middle">ODF</text>

  <!-- U6: UPS / PDU -->
  <rect x="17" y="42" width="30" height="6" rx="1" fill="#0a2d52"/>
  <rect x="17.5" y="42.5" width="29" height="5" rx="0.8" fill="#0a2d52"/>
  <!-- Batería UPS -->
  <rect x="19" y="43.5" width="14" height="3" rx="0.8" fill="#005aaa"/>
  <rect x="19.5" y="44" width="13" height="2" rx="0.5" fill="#1ba0d7"/>
  <!-- Rayo UPS -->
  <polygon points="28,43.5 26.5,46 28,46 26.5,48" fill="#f59e0b" transform="scale(0.55) translate(21,32)"/>
  <!-- Barra nivel batería -->
  <rect x="20" y="44.3" width="4" height="1.2" rx="0.3" fill="#22c55e"/>
  <rect x="24.3" y="44.3" width="4" height="1.2" rx="0.3" fill="#22c55e"/>
  <rect x="28.6" y="44.3" width="2" height="1.2" rx="0.3" fill="#f59e0b"/>
  <text x="40" y="46.5" font-family="Arial" font-size="2.8" fill="#5bc8f5" font-weight="700" text-anchor="middle">UPS</text>
  <circle cx="44.5" cy="44.5" r="1" fill="#22c55e"/>

  <!-- U7: 1U vacía inferior -->
  <rect x="17" y="49" width="30" height="4" rx="1" fill="#0a2d52"/>
  <rect x="17.5" y="49.5" width="29" height="3" rx="0.5" fill="#082240"/>

  <!-- ===== TORNILLOS RACK (esquinas) ===== -->
  <circle cx="15" cy="10"  r="1" fill="#1a5fa0" opacity="0.7"/>
  <circle cx="15" cy="20"  r="1" fill="#1a5fa0" opacity="0.7"/>
  <circle cx="15" cy="30"  r="1" fill="#1a5fa0" opacity="0.7"/>
  <circle cx="15" cy="40"  r="1" fill="#1a5fa0" opacity="0.7"/>
  <circle cx="15" cy="50"  r="1" fill="#1a5fa0" opacity="0.7"/>

  <!-- ===== PATAS ===== -->
  <rect x="14" y="57" width="7" height="3" rx="1" fill="#082240"/>
  <rect x="43" y="57" width="7" height="3" rx="1" fill="#082240"/>

  <!-- ===== ETIQUETA ===== -->
  <text x="32" y="63" font-family="Arial" font-size="4.8" font-weight="700" fill="#0070d2" text-anchor="middle" letter-spacing="0.5">ADN</text>
</svg>
