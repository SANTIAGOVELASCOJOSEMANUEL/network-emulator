<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <title>Phone icon Cisco Packet Tracer style</title>

  <!-- Cuerpo del teléfono -->
  <rect x="16" y="10" width="32" height="44" rx="5" fill="#1ba0d7"/>
  <!-- Cara superior más clara -->
  <rect x="16" y="10" width="32" height="6" rx="5" fill="#5bc8f5"/>
  <rect x="16" y="13" width="32" height="3" fill="#5bc8f5"/>
  <!-- Lado derecho sombra -->
  <rect x="43" y="10" width="5" height="44" rx="0" fill="#005aaa"/>
  <rect x="43" y="51" width="5" height="3" rx="3" fill="#005aaa"/>

  <!-- Pantalla -->
  <rect x="20" y="16" width="24" height="16" rx="2" fill="#ffffff" opacity="0.95"/>
  <rect x="20" y="16" width="24" height="3" rx="2" fill="#e0f4ff"/>

  <!-- Líneas simulando texto en pantalla -->
  <line x1="23" y1="22" x2="38" y2="22" stroke="#1ba0d7" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="23" y1="25" x2="35" y2="25" stroke="#1ba0d7" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="23" y1="28" x2="37" y2="28" stroke="#1ba0d7" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

  <!-- Teclado numérico -->
  <!-- Fila 1 -->
  <rect x="21" y="36" width="6" height="4" rx="1" fill="#0070d2"/>
  <rect x="29" y="36" width="6" height="4" rx="1" fill="#0070d2"/>
  <rect x="37" y="36" width="6" height="4" rx="1" fill="#0070d2"/>
  <!-- Fila 2 -->
  <rect x="21" y="42" width="6" height="4" rx="1" fill="#0070d2"/>
  <rect x="29" y="42" width="6" height="4" rx="1" fill="#0070d2"/>
  <rect x="37" y="42" width="6" height="4" rx="1" fill="#0070d2"/>
  <!-- Fila 3 -->
  <rect x="21" y="48" width="6" height="4" rx="1" fill="#0070d2"/>
  <rect x="29" y="48" width="6" height="4" rx="1" fill="#005aaa"/>
  <rect x="37" y="48" width="6" height="4" rx="1" fill="#0070d2"/>

  <!-- Altavoz superior -->
  <rect x="27" y="12" width="10" height="2" rx="1" fill="#0070d2" opacity="0.5"/>

  <!-- Icono auricular en pantalla -->
  <path d="M 26 19 Q 24 21 25 23 L 27 22 Q 27 21 28 20 Z" fill="#1ba0d7" opacity="0.4"/>

</svg>
