<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <title>WiFi Router icon Cisco Packet Tracer style</title>

  <!-- Ondas WiFi -->
  <!-- Onda exterior -->
  <path d="M 10 28 Q 32 8 54 28" fill="none" stroke="#1ba0d7" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Onda media -->
  <path d="M 16 32 Q 32 16 48 32" fill="none" stroke="#1ba0d7" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
  <!-- Onda interior -->
  <path d="M 22 36 Q 32 26 42 36" fill="none" stroke="#1ba0d7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Punto central -->
  <circle cx="32" cy="39" r="3" fill="#0070d2"/>
  <circle cx="32" cy="39" r="1.5" fill="#ffffff"/>

  <!-- Línea bajando al cuerpo -->
  <line x1="32" y1="42" x2="32" y2="46" stroke="#005aaa" stroke-width="2"/>

  <!-- Cuerpo del router -->
  <rect x="10" y="46" width="44" height="11" rx="3" fill="#1ba0d7"/>
  <!-- Cara superior más clara -->
  <rect x="10" y="46" width="44" height="3.5" rx="3" fill="#5bc8f5"/>
  <rect x="10" y="48" width="44" height="1.5" fill="#5bc8f5"/>
  <!-- Lado derecho sombra -->
  <rect x="51" y="46" width="3" height="11" rx="0" fill="#005aaa"/>
  <rect x="51" y="54" width="3" height="3" rx="2" fill="#005aaa"/>

  <!-- LEDs indicadores -->
  <circle cx="18" cy="52" r="2" fill="#ffffff" opacity="0.9"/>
  <circle cx="25" cy="52" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="32" cy="52" r="2" fill="#ffffff" opacity="0.6"/>

  <!-- Puerto WAN -->
  <rect x="40" y="49.5" width="7" height="5" rx="1" fill="#0070d2"/>
  <rect x="41" y="50.5" width="5" height="3" rx="0.5" fill="#005aaa"/>

  <!-- Antena izquierda -->
  <rect x="14" y="36" width="3" height="12" rx="1.5" fill="#0070d2"/>
  <rect x="14" y="36" width="3" height="4" rx="1.5" fill="#1ba0d7"/>

  <!-- Antena derecha -->
  <rect x="47" y="36" width="3" height="12" rx="1.5" fill="#0070d2"/>
  <rect x="47" y="36" width="3" height="4" rx="1.5" fill="#1ba0d7"/>

</svg>
