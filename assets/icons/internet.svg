<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <title>Internet icon Cisco Packet Tracer style</title>

  <!-- Globo terráqueo -->
  <!-- Sombra -->
  <circle cx="32" cy="33" r="24" fill="#005aaa" opacity="0.2"/>

  <!-- Cuerpo del globo -->
  <circle cx="32" cy="32" r="24" fill="#1ba0d7"/>

  <!-- Cara superior clara -->
  <ellipse cx="32" cy="16" rx="24" ry="10" fill="#5bc8f5"/>

  <!-- Meridianos verticales -->
  <ellipse cx="32" cy="32" rx="8"  ry="24" fill="none" stroke="#0070d2" stroke-width="1.2" opacity="0.8"/>
  <ellipse cx="32" cy="32" rx="16" ry="24" fill="none" stroke="#0070d2" stroke-width="1" opacity="0.6"/>

  <!-- Paralelos horizontales -->
  <line x1="8"  y1="32" x2="56" y2="32" stroke="#0070d2" stroke-width="1.2" opacity="0.8"/>
  <line x1="11" y1="22" x2="53" y2="22" stroke="#0070d2" stroke-width="1"   opacity="0.6"/>
  <line x1="11" y1="42" x2="53" y2="42" stroke="#0070d2" stroke-width="1"   opacity="0.6"/>
  <line x1="18" y1="14" x2="46" y2="14" stroke="#0070d2" stroke-width="0.8" opacity="0.5"/>
  <line x1="18" y1="50" x2="46" y2="50" stroke="#0070d2" stroke-width="0.8" opacity="0.5"/>

  <!-- Contorno del globo -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#005aaa" stroke-width="1.5"/>

  <!-- Polo norte / sur claros -->
  <ellipse cx="32" cy="8"  rx="8" ry="3" fill="#5bc8f5" opacity="0.5"/>
  <ellipse cx="32" cy="56" rx="8" ry="3" fill="#0070d2" opacity="0.4"/>

  <!-- Punto central brillante -->
  <circle cx="32" cy="32" r="3" fill="#ffffff" opacity="0.2"/>
  <circle cx="26" cy="22" r="2" fill="#ffffff" opacity="0.25"/>

</svg>
