<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <title>Laptop icon Cisco Packet Tracer style</title>

  <!-- Pantalla -->
  <rect x="10" y="8" width="44" height="30" rx="3" fill="#1ba0d7"/>
  <rect x="10" y="8" width="44" height="5" rx="3" fill="#5bc8f5"/>
  <rect x="10" y="11" width="44" height="2" fill="#5bc8f5"/>
  <rect x="54" y="8" width="0" height="30" rx="0" fill="#005aaa"/>
  <rect x="51" y="8" width="3" height="30" rx="0" fill="#005aaa"/>

  <!-- Bisagra -->
  <rect x="10" y="35" width="44" height="3" rx="0" fill="#005aaa"/>

  <!-- Pantalla interior -->
  <rect x="13" y="11" width="38" height="23" rx="1" fill="#003366"/>
  <rect x="13" y="11" width="38" height="4" rx="1" fill="#001f3f"/>
  <!-- Líneas simulando contenido -->
  <line x1="17" y1="19" x2="45" y2="19" stroke="#1ba0d7" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="17" y1="23" x2="40" y2="23" stroke="#1ba0d7" stroke-width="1"   stroke-linecap="round" opacity="0.5"/>
  <line x1="17" y1="27" x2="43" y2="27" stroke="#1ba0d7" stroke-width="1"   stroke-linecap="round" opacity="0.5"/>
  <!-- Logo en pantalla -->
  <circle cx="32" cy="15" r="2" fill="#1ba0d7" opacity="0.6"/>

  <!-- Base / teclado -->
  <rect x="6" y="38" width="52" height="14" rx="3" fill="#1ba0d7"/>
  <rect x="6" y="38" width="52" height="4" rx="3" fill="#5bc8f5"/>
  <rect x="6" y="40" width="52" height="2" fill="#5bc8f5"/>
  <rect x="55" y="38" width="3" height="14" rx="0" fill="#005aaa"/>
  <rect x="6"  y="49" width="52" height="3" rx="2" fill="#0070d2"/>

  <!-- Teclado (filas de teclas) -->
  <rect x="10" y="42" width="44" height="8" rx="1" fill="#0070d2"/>
  <!-- Fila 1 -->
  <rect x="11" y="43" width="4" height="2" rx="0.5" fill="#1ba0d7"/>
  <rect x="16" y="43" width="4" height="2" rx="0.5" fill="#1ba0d7"/>
  <rect x="21" y="43" width="4" height="2" rx="0.5" fill="#1ba0d7"/>
  <rect x="26" y="43" width="4" height="2" rx="0.5" fill="#1ba0d7"/>
  <rect x="31" y="43" width="4" height="2" rx="0.5" fill="#1ba0d7"/>
  <rect x="36" y="43" width="4" height="2" rx="0.5" fill="#1ba0d7"/>
  <rect x="41" y="43" width="4" height="2" rx="0.5" fill="#1ba0d7"/>
  <rect x="46" y="43" width="4" height="2" rx="0.5" fill="#1ba0d7"/>
  <!-- Fila 2 -->
  <rect x="11" y="46" width="6" height="2" rx="0.5" fill="#1ba0d7"/>
  <rect x="18" y="46" width="4" height="2" rx="0.5" fill="#1ba0d7"/>
  <rect x="23" y="46" width="4" height="2" rx="0.5" fill="#1ba0d7"/>
  <rect x="28" y="46" width="8" height="2" rx="0.5" fill="#1ba0d7"/>
  <rect x="37" y="46" width="4" height="2" rx="0.5" fill="#1ba0d7"/>
  <rect x="42" y="46" width="6" height="2" rx="0.5" fill="#1ba0d7"/>

  <!-- Touchpad -->
  <rect x="25" y="49" width="14" height="2" rx="1" fill="#005aaa"/>

</svg>
