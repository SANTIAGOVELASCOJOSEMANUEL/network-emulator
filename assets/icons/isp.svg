<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <title>ISP icon Cisco Packet Tracer style</title>

  <!-- Torre de transmisión -->
  <!-- Base de la torre -->
  <rect x="28" y="52" width="8" height="4" rx="1" fill="#005aaa"/>
  <rect x="24" y="55" width="16" height="3" rx="1.5" fill="#0070d2"/>
  <rect x="24" y="55" width="16" height="1.5" rx="1.5" fill="#1ba0d7"/>

  <!-- Patas base izquierda y derecha -->
  <line x1="28" y1="52" x2="20" y2="56" stroke="#0070d2" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="52" x2="44" y2="56" stroke="#0070d2" stroke-width="2" stroke-linecap="round"/>

  <!-- Cuerpo de la torre (triángulo convergente) -->
  <!-- Pata izquierda -->
  <line x1="22" y1="52" x2="30" y2="20" stroke="#0070d2" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Pata derecha -->
  <line x1="42" y1="52" x2="34" y2="20" stroke="#0070d2" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Travesaños horizontales de la torre -->
  <line x1="25" y1="44" x2="39" y2="44" stroke="#1ba0d7" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="27" y1="37" x2="37" y2="37" stroke="#1ba0d7" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="29" y1="30" x2="35" y2="30" stroke="#1ba0d7" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="30.5" y1="24" x2="33.5" y2="24" stroke="#1ba0d7" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Travesaños diagonales -->
  <line x1="25" y1="44" x2="29" y2="37" stroke="#005aaa" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="39" y1="44" x2="35" y2="37" stroke="#005aaa" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="27" y1="37" x2="30" y2="30" stroke="#005aaa" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="37" y1="37" x2="34" y2="30" stroke="#005aaa" stroke-width="1" stroke-linecap="round" opacity="0.7"/>

  <!-- Mástil superior -->
  <line x1="32" y1="20" x2="32" y2="10" stroke="#0070d2" stroke-width="2" stroke-linecap="round"/>

  <!-- Antena parabólica pequeña (lateral) -->
  <path d="M 32 14 Q 38 12 38 18" fill="none" stroke="#1ba0d7" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="14" x2="38" y2="15" stroke="#005aaa" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Ondas de señal saliendo de la cima -->
  <path d="M 24 9 Q 32 4 40 9"  fill="none" stroke="#1ba0d7" stroke-width="2"   stroke-linecap="round" opacity="0.5"/>
  <path d="M 27 12 Q 32 8 37 12" fill="none" stroke="#1ba0d7" stroke-width="2"   stroke-linecap="round" opacity="0.8"/>
  <path d="M 29 15 Q 32 12 35 15" fill="none" stroke="#5bc8f5" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Punto de emisión en la cima -->
  <circle cx="32" cy="10" r="2.5" fill="#0070d2"/>
  <circle cx="32" cy="10" r="1.5" fill="#5bc8f5"/>
  <circle cx="32" cy="10" r="0.8" fill="#ffffff"/>

  <!-- Etiqueta ISP -->
  <text x="32" y="63" text-anchor="middle" font-family="Arial" font-size="6" font-weight="bold" fill="#0070d2" letter-spacing="1">ISP</text>

</svg>
