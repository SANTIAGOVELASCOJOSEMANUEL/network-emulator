<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <title>Bullet Security Camera icon Cisco Packet Tracer style</title>

  <!-- Soporte de montaje en pared -->
  <rect x="28" y="6" width="8" height="12" rx="2" fill="#0070d2"/>
  <rect x="28" y="6" width="8" height="3" rx="2" fill="#1ba0d7"/>
  <!-- Tornillos -->
  <circle cx="30" cy="9"  r="1" fill="#005aaa"/>
  <circle cx="34" cy="9"  r="1" fill="#005aaa"/>
  <circle cx="30" cy="15" r="1" fill="#005aaa"/>
  <circle cx="34" cy="15" r="1" fill="#005aaa"/>

  <!-- Articulación / pivote -->
  <circle cx="32" cy="19" r="5" fill="#0070d2"/>
  <circle cx="32" cy="19" r="3" fill="#1ba0d7"/>
  <circle cx="32" cy="19" r="1.2" fill="#005aaa"/>

  <!-- Cuerpo tipo bala (cilindro horizontal inclinado) -->
  <!-- Parte trasera del cuerpo -->
  <rect x="12" y="24" width="38" height="16" rx="8" fill="#1ba0d7"/>
  <!-- Cara superior clara -->
  <rect x="12" y="24" width="38" height="4" rx="8" fill="#5bc8f5"/>
  <rect x="18" y="24" width="30" height="2" fill="#5bc8f5"/>
  <!-- Sombra inferior -->
  <rect x="18" y="36" width="30" height="4" rx="4" fill="#0070d2"/>
  <!-- Sombra lateral derecha -->
  <rect x="44" y="26" width="4" height="12" rx="4" fill="#005aaa"/>

  <!-- Anillos del cuerpo (textura bala) -->
  <line x1="36" y1="24.5" x2="36" y2="39.5" stroke="#005aaa" stroke-width="1" opacity="0.5"/>
  <line x1="28" y1="24.5" x2="28" y2="39.5" stroke="#005aaa" stroke-width="1" opacity="0.5"/>

  <!-- Capucha / parasol (visera superior) -->
  <rect x="10" y="21" width="36" height="6" rx="2" fill="#0070d2"/>
  <rect x="10" y="21" width="36" height="2.5" rx="2" fill="#1ba0d7"/>

  <!-- Nariz delantera cónica -->
  <ellipse cx="13" cy="32" rx="4" ry="8" fill="#0070d2"/>
  <ellipse cx="13" cy="32" rx="3" ry="6" fill="#005aaa"/>

  <!-- Lente frontal -->
  <circle cx="13" cy="32" r="4.5" fill="#0070d2"/>
  <circle cx="13" cy="32" r="3.5" fill="#005aaa"/>
  <circle cx="13" cy="32" r="2.5" fill="#003366"/>
  <circle cx="13" cy="32" r="1.5" fill="#001f3f"/>
  <circle cx="13" cy="32" r="0.7" fill="#1ba0d7"/>
  <!-- Reflejo lente -->
  <circle cx="12" cy="31" r="0.8" fill="#5bc8f5" opacity="0.7"/>

  <!-- Conector trasero -->
  <rect x="50" y="29" width="7" height="6" rx="1.5" fill="#0070d2"/>
  <rect x="50" y="29" width="7" height="2" rx="1.5" fill="#1ba0d7"/>

  <!-- Cable -->
  <path d="M 57 32 Q 61 32 61 38 Q 61 46 56 48" fill="none" stroke="#005aaa" stroke-width="2" stroke-linecap="round"/>

  <!-- LED IR en la nariz -->
  <circle cx="20" cy="27" r="1.2" fill="#1ba0d7" opacity="0.8"/>
  <circle cx="24" cy="27" r="1.2" fill="#1ba0d7" opacity="0.8"/>

</svg>
