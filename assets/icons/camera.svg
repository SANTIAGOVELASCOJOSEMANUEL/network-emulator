<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <title>Dome Security Camera - Cisco Packet Tracer style</title>

  <!-- Base de montaje en techo -->
  <ellipse cx="32" cy="20" rx="22" ry="7" fill="#005aaa"/>
  <ellipse cx="32" cy="18" rx="22" ry="7" fill="#0070d2"/>
  <ellipse cx="32" cy="18" rx="22" ry="5" fill="#1ba0d7"/>
  <path d="M 10 18 Q 10 15 32 15 Q 54 15 54 18" fill="#5bc8f5"/>
  
  <!-- Anillo de la base -->
  <ellipse cx="32" cy="24" rx="20" ry="4" fill="#0070d2"/>
  <ellipse cx="32" cy="24" rx="18" ry="3" fill="#1ba0d7"/>

  <!-- Cuerpo cilíndrico del domo -->
  <rect x="14" y="24" width="36" height="10" fill="#0070d2"/>
  <rect x="14" y="24" width="36" height="3" fill="#1ba0d7"/>
  <rect x="14" y="31" width="36" height="3" fill="#005aaa"/>
  
  <!-- Lados redondeados del cilindro -->
  <ellipse cx="14" cy="29" rx="3" ry="5" fill="#005aaa"/>
  <ellipse cx="50" cy="29" rx="3" ry="5" fill="#005aaa"/>
  <ellipse cx="14" cy="29" rx="2" ry="5" fill="#0070d2"/>
  <ellipse cx="50" cy="29" rx="2" ry="5" fill="#0070d2"/>

  <!-- Domo transparente (hemisferio) -->
  <ellipse cx="32" cy="34" rx="18" ry="8" fill="#1ba0d7" opacity="0.3"/>
  <ellipse cx="32" cy="36" rx="17" ry="10" fill="#5bc8f5" opacity="0.2"/>
  <ellipse cx="32" cy="38" rx="16" ry="12" fill="#1ba0d7" opacity="0.15"/>
  <ellipse cx="32" cy="42" rx="15" ry="13" fill="#5bc8f5" opacity="0.25"/>
  
  <!-- Reflejo del domo -->
  <ellipse cx="28" cy="36" rx="8" ry="5" fill="#ffffff" opacity="0.4"/>
  <ellipse cx="26" cy="38" rx="4" ry="3" fill="#ffffff" opacity="0.6"/>

  <!-- Cámara interna visible a través del domo -->
  <ellipse cx="32" cy="42" rx="8" ry="6" fill="#005aaa" opacity="0.7"/>
  <ellipse cx="32" cy="42" rx="6" ry="5" fill="#0070d2" opacity="0.8"/>
  
  <!-- Lente de la cámara -->
  <circle cx="32" cy="42" r="5" fill="#003366" opacity="0.9"/>
  <circle cx="32" cy="42" r="4" fill="#001f3f"/>
  <circle cx="32" cy="42" r="2.5" fill="#000000"/>
  
  <!-- Reflejo en el lente -->
  <circle cx="30" cy="40" r="1.5" fill="#5bc8f5" opacity="0.7"/>

  <!-- LEDs IR alrededor de la cámara -->
  <circle cx="26" cy="40" r="1" fill="#1ba0d7" opacity="0.5"/>
  <circle cx="38" cy="40" r="1" fill="#1ba0d7" opacity="0.5"/>
  <circle cx="28" cy="45" r="1" fill="#1ba0d7" opacity="0.5"/>
  <circle cx="36" cy="45" r="1" fill="#1ba0d7" opacity="0.5"/>

  <!-- Detalles de tornillos en la base -->
  <circle cx="18" cy="28" r="1" fill="#005aaa"/>
  <circle cx="46" cy="28" r="1" fill="#005aaa"/>
  
  <!-- Indicador LED de estado -->
  <circle cx="44" cy="26" r="1.2" fill="#00ff00" opacity="0.8"/>

</svg>
