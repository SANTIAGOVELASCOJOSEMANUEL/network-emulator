<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <title>Alarm icon Cisco Packet Tracer style</title>

  <!-- Base/pie de la sirena -->
  <rect x="18" y="50" width="28" height="6" rx="2" fill="#0070d2"/>
  <rect x="18" y="50" width="28" height="2.5" rx="2" fill="#1ba0d7"/>
  <rect x="18" y="53.5" width="28" height="2.5" rx="1" fill="#005aaa"/>

  <!-- Cuerpo central -->
  <rect x="21" y="31" width="22" height="21" rx="2" fill="#0070d2"/>
  <!-- Cara superior más clara -->
  <rect x="21" y="31" width="22" height="3" rx="2" fill="#1ba0d7"/>
  <!-- Lado derecho sombra -->
  <rect x="39" y="31" width="4" height="21" rx="0" fill="#005aaa"/>

  <!-- Rejilla de bocina -->
  <rect x="24" y="36" width="14" height="13" rx="1" fill="#ffffff" opacity="0.15"/>
  <line x1="24" y1="39.5" x2="38" y2="39.5" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>
  <line x1="24" y1="43" x2="38" y2="43" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>
  <line x1="24" y1="46.5" x2="38" y2="46.5" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>

  <!-- Cuello superior -->
  <rect x="25" y="23" width="14" height="9" rx="2" fill="#1ba0d7"/>
  <rect x="25" y="23" width="14" height="3" rx="2" fill="#5bc8f5"/>
  <rect x="35" y="23" width="4" height="9" rx="0" fill="#0070d2"/>

  <!-- Cúpula -->
  <ellipse cx="32" cy="23" rx="11" ry="4.5" fill="#1ba0d7"/>
  <ellipse cx="32" cy="23" rx="11" ry="4.5" fill="none" stroke="#005aaa" stroke-width="0.8"/>

  <!-- Domo de luz (blanco/amarillo estilo PT) -->
  <ellipse cx="32" cy="19.5" rx="8" ry="4" fill="#ffffff"/>
  <ellipse cx="32" cy="18.5" rx="5" ry="2.5" fill="#e0f4ff"/>
  <ellipse cx="31" cy="18" rx="2.5" ry="1.2" fill="#ffffff"/>
  <!-- Contorno del domo -->
  <ellipse cx="32" cy="19.5" rx="8" ry="4" fill="none" stroke="#1ba0d7" stroke-width="0.8"/>

  <!-- Tornillo/base del domo -->
  <rect x="29" y="23" width="6" height="2" rx="0" fill="#005aaa"/>

  <!-- Ondas de sonido izquierda -->
  <path d="M 16 25 Q 10 32 16 39" fill="none" stroke="#1ba0d7" stroke-width="2" stroke-linecap="round"/>
  <path d="M 10 20 Q 2 32 10 44" fill="none" stroke="#1ba0d7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Ondas de sonido derecha -->
  <path d="M 48 25 Q 54 32 48 39" fill="none" stroke="#1ba0d7" stroke-width="2" stroke-linecap="round"/>
  <path d="M 54 20 Q 62 32 54 44" fill="none" stroke="#1ba0d7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
