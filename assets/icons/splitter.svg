<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <title>PoE Splitter 64x64</title>

  <!-- Sombra base -->
  <ellipse cx="32" cy="62" rx="22" ry="1.8" fill="#005aaa" opacity="0.18"/>

  <!-- Cuerpo principal del splitter (caja compacta) -->
  <rect x="10" y="18" width="44" height="28" rx="4" fill="#1ba0d7"/>
  <!-- Highlight superior -->
  <rect x="10" y="18" width="44" height="6" rx="4" fill="#5bc8f5"/>
  <rect x="10" y="22" width="44" height="2" fill="#5bc8f5"/>
  <!-- Cara inferior sombra -->
  <rect x="10" y="40" width="44" height="6" rx="3" fill="#005aaa"/>
  <!-- Cara lateral derecha -->
  <rect x="51" y="18" width="3" height="28" rx="0" fill="#005aaa"/>

  <!-- Panel frontal -->
  <rect x="13" y="23" width="38" height="18" rx="2" fill="#0070d2"/>

  <!-- ===== LADO IZQUIERDO: IN (PoE) — 1 puerto RJ45 ===== -->
  <!-- Etiqueta IN -->
  <text x="18" y="27" font-family="Arial" font-size="4" font-weight="700" fill="#5bc8f5" text-anchor="middle">IN</text>
  <!-- Puerto RJ45 entrada -->
  <rect x="14" y="28" width="8" height="10" rx="1.2" fill="#005aaa"/>
  <rect x="14.8" y="28.8" width="6.4" height="8.4" rx="0.8" fill="#1ba0d7"/>
  <!-- Pins RJ45 -->
  <rect x="15.5" y="29.5" width="0.8" height="4" rx="0.3" fill="#5bc8f5" opacity="0.8"/>
  <rect x="16.8" y="29.5" width="0.8" height="4" rx="0.3" fill="#5bc8f5" opacity="0.8"/>
  <rect x="18.1" y="29.5" width="0.8" height="4" rx="0.3" fill="#5bc8f5" opacity="0.8"/>
  <rect x="19.4" y="29.5" width="0.8" height="4" rx="0.3" fill="#5bc8f5" opacity="0.8"/>
  <!-- LED activo (verde) -->
  <circle cx="22" cy="29" r="1.2" fill="#22c55e" opacity="0.95"/>

  <!-- ===== FLECHA / DIVISIÓN central ===== -->
  <!-- Línea horizontal central -->
  <line x1="24" y1="33" x2="40" y2="33" stroke="#5bc8f5" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Bifurcación: línea a DATA (arriba) -->
  <line x1="36" y1="33" x2="36" y2="28" stroke="#5bc8f5" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Bifurcación: línea a PWR (abajo) -->
  <line x1="36" y1="33" x2="36" y2="38" stroke="#f97316" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Punta flecha DATA -->
  <polygon points="36,27 34.8,29.5 37.2,29.5" fill="#5bc8f5"/>
  <!-- Punta flecha PWR -->
  <polygon points="36,39 34.8,36.5 37.2,36.5" fill="#f97316"/>
  <!-- Nodo bifurcación -->
  <circle cx="36" cy="33" r="1.2" fill="#5bc8f5"/>

  <!-- ===== LADO DERECHO: OUT DATA + OUT PWR ===== -->
  <!-- Etiqueta DATA -->
  <text x="50" y="27" font-family="Arial" font-size="3.2" font-weight="700" fill="#5bc8f5" text-anchor="middle">DATA</text>
  <!-- Puerto DATA (azul) -->
  <rect x="42" y="27.5" width="8" height="6.5" rx="1" fill="#005aaa"/>
  <rect x="42.7" y="28.2" width="6.6" height="5.1" rx="0.6" fill="#1ba0d7"/>
  <rect x="43.3" y="28.8" width="0.7" height="2.8" rx="0.2" fill="#5bc8f5" opacity="0.8"/>
  <rect x="44.4" y="28.8" width="0.7" height="2.8" rx="0.2" fill="#5bc8f5" opacity="0.8"/>
  <rect x="45.5" y="28.8" width="0.7" height="2.8" rx="0.2" fill="#5bc8f5" opacity="0.8"/>
  <rect x="46.6" y="28.8" width="0.7" height="2.8" rx="0.2" fill="#5bc8f5" opacity="0.8"/>
  <!-- LED DATA azul -->
  <circle cx="51" cy="28.5" r="1" fill="#3b82f6" opacity="0.95"/>

  <!-- Etiqueta PWR -->
  <text x="50" y="37" font-family="Arial" font-size="3.2" font-weight="700" fill="#f97316" text-anchor="middle">PWR</text>
  <!-- Puerto PWR (naranja/DC) -->
  <rect x="42" y="36" width="8" height="5" rx="1" fill="#005aaa"/>
  <rect x="42.7" y="36.7" width="6.6" height="3.6" rx="0.6" fill="#7c3400"/>
  <!-- Símbolo DC barrel -->
  <circle cx="46" cy="38.5" r="1.5" fill="#f97316" opacity="0.9"/>
  <circle cx="46" cy="38.5" r="0.6" fill="#7c3400"/>
  <!-- LED PWR naranja -->
  <circle cx="51" cy="37.5" r="1" fill="#f59e0b" opacity="0.95"/>

  <!-- Patas -->
  <rect x="13" y="46" width="8" height="3" rx="1.2" fill="#005aaa"/>
  <rect x="43" y="46" width="8" height="3" rx="1.2" fill="#005aaa"/>

  <!-- Etiqueta inferior -->
  <text x="32" y="58" font-family="Arial" font-size="5" font-weight="700" fill="#0070d2" text-anchor="middle" letter-spacing="0.3">SPLITTER</text>
  <text x="32" y="63" font-family="Arial" font-size="3.2" fill="#1ba0d7" text-anchor="middle" letter-spacing="0.5">PoE / 802.3af</text>
</svg>
